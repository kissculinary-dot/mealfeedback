<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
text-align:center;
}

/* Header */

.header{
margin-top:100px;
}

.header h1{
font-size:54px;
margin:0;
color:#222;
}

/* Main Area */

.mainArea{
flex:1;
display:flex;
align-items:center;
justify-content:center;
width:100%;
}

/* Menu Layout */

.menuContainer{
display:flex;
gap:220px;
justify-content:center;
}

.menuCard{
display:flex;
flex-direction:column;
align-items:center;
}

/* Titles */

.menuTitle{
font-size:38px;
font-weight:700;
margin-bottom:50px;
}

.korean{color:#c62828;}
.american{color:#1e3a8a;}
.whiteTitle{color:#444;}

/* Buttons */

.buttonRow{
display:flex;
gap:40px;
}

.feedbackBtn{
width:200px;
height:200px;
border-radius:50%;
border:none;
font-size:60px;
cursor:pointer;
color:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 20px 55px rgba(0,0,0,0.2);
transition:.25s;
position:relative;
overflow:hidden;
}

.koreanBtn{
background:linear-gradient(145deg,#d32f2f,#b71c1c);
}

.americanBtn{
background:linear-gradient(145deg,#1e3a8a,#0f2557);
}

.whiteBtn{
background:linear-gradient(145deg,#ffffff,#eaeaea);
color:#333;
}

.feedbackBtn:hover{
transform:scale(1.08);
}

.feedbackBtn:active{
transform:scale(.93);
}

/* Popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:40px 70px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
font-size:28px;
font-weight:600;
opacity:0;
pointer-events:none;
}

.show{
animation:popup .45s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Hearts */

.heart{
position:fixed;
font-size:22px;
animation:floatHeart 2.2s ease-out forwards;
pointer-events:none;
}

@keyframes floatHeart{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-180px) scale(1.6);opacity:0;}
}

/* Crying emojis */

.cry{
position:fixed;
font-size:22px;
animation:floatCry 2.2s ease-out forwards;
pointer-events:none;
}

@keyframes floatCry{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-160px) scale(1.4);opacity:0;}
}

/* Manager Dashboard */

#manager{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:32px;
text-align:center;
}

#manager h1{
font-size:48px;
letter-spacing:1px;
margin-bottom:40px;
}

#closeManager{
position:absolute;
top:25px;
right:35px;
font-size:36px;
cursor:pointer;
color:white;
}

#stats{
margin-top:20px;
font-size:34px;
line-height:2.2;
font-weight:600;
}

.statRow{
margin:18px 0;
}

/* MOBILE */

@media (max-width:768px){

.header{
margin-top:40px;
}

.header h1{
font-size:32px;
padding:0 20px;
}

.menuContainer{
flex-direction:column;
gap:60px;
align-items:center;
}

.menuTitle{
font-size:28px;
margin-bottom:25px;
}

.buttonRow{
gap:25px;
}

.feedbackBtn{
width:120px;
height:120px;
font-size:40px;
}

}

</style>

</head>

<body>

<div class="header">
<h1>How was your meal today?</h1>
</div>

<div class="mainArea">
<div id="content"></div>
</div>

<div id="popup">Thank you for your feedback!</div>

<div id="manager">

<div id="closeManager">✕</div>

<h1>Manager Dashboard</h1>

<div id="stats">Loading...</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwATBL0-o0_d52bSJaYImVZwJ0LBP-NqVi5RPMl8op7Q0unpdvmUDH9tVdIMqvcUhgC/exec";

/* SCREEN */

function updateScreen(){

const now=new Date();
const minutes=now.getHours()*60+now.getMinutes();

let html="";

if(minutes>=420 && minutes<720){

html=`
<div class="menuCard">
<div class="menuTitle whiteTitle">Breakfast</div>
<div class="buttonRow">
<button class="feedbackBtn whiteBtn" data-menu="Breakfast" data-response="Loved it">👍</button>
<button class="feedbackBtn whiteBtn" data-menu="Breakfast" data-response="Needs Improvement">👎</button>
</div>
</div>
`;

}

else if(minutes>=720 && minutes<1050){

html=`
<div class="menuContainer">

<div class="menuCard">
<div class="menuTitle korean">Korean Menu</div>
<div class="buttonRow">
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

<div class="menuCard">
<div class="menuTitle american">American Menu</div>
<div class="buttonRow">
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

</div>
`;

}

else if(minutes>=1050 && minutes<1260){

html=`
<div class="menuCard">
<div class="menuTitle whiteTitle">Dinner</div>
<div class="buttonRow">
<button class="feedbackBtn whiteBtn" data-menu="Dinner" data-response="Loved it">👍</button>
<button class="feedbackBtn whiteBtn" data-menu="Dinner" data-response="Needs Improvement">👎</button>
</div>
</div>
`;

}

document.getElementById("content").innerHTML=html;

attachButtons();

}

/* HEARTS */

function showHearts(){

for(let i=0;i<22;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=Math.random()*window.innerHeight+"px";
heart.style.fontSize=(18+Math.random()*24)+"px";
heart.style.animationDuration=(1.5+Math.random()*1.5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2500);

}

}

/* CRY */

function showCry(){

for(let i=0;i<18;i++){

const cry=document.createElement("div");
cry.className="cry";
cry.innerHTML="😢";

cry.style.left=Math.random()*window.innerWidth+"px";
cry.style.top=Math.random()*window.innerHeight+"px";
cry.style.fontSize=(18+Math.random()*24)+"px";
cry.style.animationDuration=(1.5+Math.random()*1.5)+"s";

document.body.appendChild(cry);

setTimeout(()=>cry.remove(),2500);

}

}

/* BUTTONS */

function attachButtons(){

document.querySelectorAll(".feedbackBtn").forEach(btn=>{

btn.addEventListener("click",()=>{

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:btn.dataset.menu,
response:btn.dataset.response,
timestamp:new Date().toISOString()
})
});

if(btn.dataset.response==="Loved it") showHearts();
if(btn.dataset.response==="Needs Improvement") showCry();

showPopup();

});

});

}

/* POPUP */

function showPopup(){

const popup=document.getElementById("popup");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1000);

}

/* MANAGER DASHBOARD */

function loadStats(){

fetch(SCRIPT_URL)
.then(res=>res.text())
.then(text=>{

const data=JSON.parse(text);
const today=data.today || {};

const bUp=today.breakfast_up ?? 0;
const bDown=today.breakfast_down ?? 0;

const kUp=today.korean_up ?? 0;
const kDown=today.korean_down ?? 0;

const aUp=today.american_up ?? 0;
const aDown=today.american_down ?? 0;

const dUp=today.dinner_up ?? 0;
const dDown=today.dinner_down ?? 0;

const bTotal=bUp+bDown;
const kTotal=kUp+kDown;
const aTotal=aUp+aDown;
const dTotal=dUp+dDown;

const totalVotes=bTotal+kTotal+aTotal+dTotal;

function percent(part,total){
if(total===0) return 0;
return Math.round((part/total)*100);
}

document.getElementById("stats").innerHTML=`

<div class="statRow">
Breakfast 👍 ${bUp} (${percent(bUp,bTotal)}%) | 👎 ${bDown} (${percent(bDown,bTotal)}%) | Total: ${bTotal}
</div>

<div class="statRow">
Korean 👍 ${kUp} (${percent(kUp,kTotal)}%) | 👎 ${kDown} (${percent(kDown,kTotal)}%) | Total: ${kTotal}
</div>

<div class="statRow">
American 👍 ${aUp} (${percent(aUp,aTotal)}%) | 👎 ${aDown} (${percent(aDown,aTotal)}%) | Total: ${aTotal}
</div>

<div class="statRow">
Dinner 👍 ${dUp} (${percent(dUp,dTotal)}%) | 👎 ${dDown} (${percent(dDown,dTotal)}%) | Total: ${dTotal}
</div>

<div class="statRow" style="margin-top:40px;font-size:40px;">
Total Votes Today: ${totalVotes}
</div>

`;

})
.catch(()=>{
document.getElementById("stats").innerHTML="Unable to load stats";
});

}

/* SECRET TAP */

let tapCount=0;

document.body.addEventListener("click",(e)=>{

if(e.clientX>window.innerWidth-120 && e.clientY<120){

tapCount++;

if(tapCount>=5){
openManager();
tapCount=0;
}

}

});

/* OPEN */

function openManager(){

document.getElementById("manager").style.display="flex";

loadStats();

setInterval(loadStats,5000);

}

/* CLOSE */

document.getElementById("closeManager").onclick=()=>{
document.getElementById("manager").style.display="none";
};

updateScreen();
setInterval(updateScreen,60000);

</script>

</body>
</html>
